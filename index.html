<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Prestasi Siswa SDIT Daarul Hasanah</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo-area">

  <img
    src="img/CORPORSTION.png"
    alt="Logo"
    class="logo">

  <h2>KEAMANAN SDIT DAARUL HASANAH</h2>
  
    <button onclick="showMenu('prestasisiswa')">
      prestasi siswa
    </button>
  
</div>
</div>
<!-- CONTENT -->

<div class="content">

  <!-- PRESTASI SISWA -->
<div id="prestasisiswa" class="menu">
  <h2>Prestasi Siswa</h2>

  <!-- FORM INPUT PRESTASI SISWA -->
  <form 
  action="https://script.google.com/macros/s/AKfycbz-gKntihi2KtpGK9KkdpMewBKFagGyBclhBHt9swr47IGfqxYWjXyEEpgh5LCl0mI/exec" 
  method="POST" 
  target="_blank"
>

  <input type="text" name="nama" placeholder="Nama" required>
  <input type="text" name="kelas" placeholder="Kelas" required>
  <input type="text" name="nama_perlombaan" placeholder="Nama Perlombaan" required>
  <input type="text" name="tingkat_perlombaan" placeholder="Tingkat Perlombaan" required>
  <input type="text" name="juara" placeholder="Juara" required>
  <input type="number" name="tahun_kejuaraan" placeholder="Tahun Kejuaraan" required>
  <button type="submit">Simpan</button>

</form>
  <hr>

  <!-- SEARCH DATA -->
  <h3>Data Prestasi Siswa</h3>
  <input 
    type="text" 
    id="searchIzinKeluar" 
    placeholder="Cari surat izin keluar..." 
    class="search-box" 
    onkeyup="searchTable('searchIzinKeluar','frameIzinKeluar')"
  >

  <!-- TOMBOL EDIT / DOWNLOAD -->
  <a href="https://docs.google.com/spreadsheets/d/146HoEJcIqQpOyJun4Ts91t2cbHX86bXI19erKYA30lc/edit"
      target="_blank" class="admin-btn">
      Edit Data Spreadsheet
    </a>
  
  <a href="https://docs.google.com/spreadsheets/d/146HoEJcIqQpOyJun4Ts91t2cbHX86bXI19erKYA30lc/export?format=xlsx" 
     target="_blank" 
     class="download-btn">
    Download Excel
  </a>

  <!-- IFRAME DATA -->
  <iframe 
    id="frameIzinKeluar" 
    src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRImnnqGV9OkxlKFiFg7v5Eze8dymWM5dAfXbYXbQH37AcrXBD2lBl_vWCRmHJ8Hcf8qQah8mFjKfCE/pubhtml?gid=0&single=true" 
    class="frame">
  </iframe>

</div>
  

</div>

</div>
<script src="js/script.js"></script>

</body>
</html>
